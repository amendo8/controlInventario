<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Detalle de Inventario: {{ producto.parte.nombre }}</h2>
        <a href="{% url 'lista_inventario' %}" class="btn btn-secondary">Volver</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Serial</th>
                        <th>Ubicación / Oficina</th>
                        <th>Estado</th>
                        <th>Factura</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td><code>{{ item.serial|default:"SIN SERIAL" }}</code></td>
                        <td>{{ item.oficina.nombre }}</td>
                        <td><span class="badge bg-success">Disponible</span></td>
                        <td>
                            {% if item.foto_factura %}
                                <a href="{{ item.foto_factura.url }}" target="_blank" class="btn btn-sm btn-outline-info">Ver Factura</a>
                            {% else %}
                                <small class="text-muted">No cargada</small>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
