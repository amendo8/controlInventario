{% extends 'core/base.html' %}
{% block content %}
<div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
    <h2 class="text-2xl font-bold text-gray-800">Inventario de Partes</h2>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center transition shadow-lg shadow-blue-200">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Agregar Parte
    </button>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50 text-gray-600 text-sm uppercase font-semibold">
            <tr>
                <th class="px-6 py-4">Código</th>
                <th class="px-6 py-4">Descripción</th>
                <th class="px-6 py-4 text-center">Stock</th>
                <th class="px-6 py-4">Estado</th>
                <th class="px-6 py-4">Acciones</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for item in inventario %}
            <tr class="hover:bg-blue-50/30 transition">
                <td class="px-6 py-4 font-mono font-medium text-blue-600">{{ item.codigo }}</td>
                <td class="px-6 py-4 text-gray-700">{{ item.nombre }}</td>
                <td class="px-6 py-4 text-center font-bold">{{ item.cantidad }}</td>
                <td class="px-6 py-4">
                    {% if item.cantidad > 5 %}
                    <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Disponible</span>
                    {% else %}
                    <span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">Crítico</span>
                    {% endif %}
                </td>
                <td class="px-6 py-4">
                    <button class="text-gray-400 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
