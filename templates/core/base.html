<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ServiExpress{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans text-gray-900">

    <nav class="bg-slate-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight">ServiExpress</span>
                </div>

                <div class="hidden md:flex space-x-4 items-center">
                    {% if user.is_authenticated %}
                        <a href="{% url 'home' %}" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-700 transition">Inicio</a>
                        <a href="{% url 'inventario' %}" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-700 transition">Inventario</a>
                        <a href="{% url 'transacciones' %}" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-700 transition">Transacciones</a>
                        <a href="{% url 'configuracion' %}" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-700 transition">Configuración</a>
                        
                        <form action="{% url 'logout' %}" method="post" class="ml-4">
                            {% csrf_token %}
                            <button type="submit" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-md">
                                Salir
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-semibold transition">Acceder</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        {% block content %}
        
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 py-6">
        <div class="text-center text-gray-500 text-sm">
            &copy; 2026 ServiExpress Global. Panel de Control de Ingeniería.
        </div>
    </footer>

</body>
</html>
